	<script>
		  // Helper function polyfill for v 4.16.14 update
		  //Dont remove this as this will stuck shaka player for newer versions as some browser still dont support Map js
		  //https://github.com/shaka-project/shaka-player/releases/tag/v4.16.14  Use Map.getOrInsert/getOrInsertComputed native methods (#9546) (66178c8)
		  
if (!Map.prototype.getOrInsertComputed) {
  Map.prototype.getOrInsertComputed = function (key, compute) {
    if (!this.has(key)) {
      const value = compute();
      this.set(key, value);
      return value;
    }
    return this.get(key);
  };
}

if (!Map.prototype.getOrInsert) {
  Map.prototype.getOrInsert = function (key, value) {
    if (!this.has(key)) {
      this.set(key, value);
      return value;
    }
    return this.get(key);
  };
}

//creating new button for control paner +5sec -5sec
	// Custom Skip Forward Button (+5 seconds)
class SkipForwardButton extends shaka.ui.Element {
  constructor(parent, controls) {
    super(parent, controls);
    
    // Create the button element
    this.button_ = document.createElement('button');
    this.button_.className = 'shaka-skip-forward-button shaka-tooltip';
    this.button_.setAttribute('aria-label', 'Skip forward 5 seconds');
     this.button_.innerHTML = `
     <svg class="shaka-ui-icon" aria-hidden="true" viewBox="0 -960 960 960">
    <path d="M480-80q-75 0-140.5-28.5t-114-77q-48.5-48.5-77-114T120-440q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-800h6l-62-62 56-58 160 160-160 160-56-58 62-62h-6q-117 0-198.5 81.5T200-440q0 117 81.5 198.5T480-160q117 0 198.5-81.5T760-440h80q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-80ZM380-320v-60h120v-40H380v-140h180v60H440v40h80q17 0 28.5 11.5T560-420v60q0 17-11.5 28.5T520-320H380Z"/>
  </svg>
`;
    
    this.parent.appendChild(this.button_);
    
    // Listen for clicks
    this.eventManager.listen(this.button_, 'click', () => {
      const video = this.video;
      if (video) {
        video.currentTime = Math.min(video.currentTime + 5, video.duration);
      }
    });
  }
}

// Factory for Skip Forward Button
SkipForwardButton.Factory = class {
  create(rootElement, controls) {
    return new SkipForwardButton(rootElement, controls);
  }
};

// Custom Skip Backward Button (-5 seconds)
class SkipBackwardButton extends shaka.ui.Element {
  constructor(parent, controls) {
    super(parent, controls);
    
    // Create the button element
    this.button_ = document.createElement('button');
    this.button_.className = 'shaka-skip-backward-button shaka-tooltip';
    this.button_.setAttribute('aria-label', 'Skip backward 5 seconds');
     this.button_.innerHTML = `
     <svg class="shaka-ui-icon" aria-hidden="true" viewBox="0 -960 960 960">
    <path d="M480-80q-75 0-140.5-28.5t-114-77q-48.5-48.5-77-114T120-440h80q0 117 81.5 198.5T480-160q117 0 198.5-81.5T760-440q0-117-81.5-198.5T480-720h-6l62 62-56 58-160-160 160-160 56 58-62 62h6q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-440q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-80ZM380-320v-60h120v-40H380v-140h180v60H440v40h80q17 0 28.5 11.5T560-420v60q0 17-11.5 28.5T520-320H380Z"/>
  </svg>
`;
    
    this.parent.appendChild(this.button_);
    
    // Listen for clicks
    this.eventManager.listen(this.button_, 'click', () => {
      const video = this.video;
      if (video) {
        video.currentTime = Math.max(video.currentTime - 5, 0);
      }
    });
  }
}

// Factory for Skip Backward Button
SkipBackwardButton.Factory = class {
  create(rootElement, controls) {

  }
};

// Register the custom elements with Shaka UI Controls
shaka.ui.Controls.registerElement('skip_forward_5', new SkipForwardButton.Factory());
shaka.ui.Controls.registerElement('skip_backward_5', new SkipBackwardButton.Factory());





// add element to show quality resolution and data usage

// ✅ SESSION-LEVEL SHAKA DATA USAGE (MB) to track Data usage
window.shakaSessionUsageMB = 00;

class StreamStatsElement extends shaka.ui.Element {
  constructor(parent, controls) {
    super(parent, controls);

    this.player = controls.getPlayer();

    // Create container
    this.container = document.createElement('div');
    this.container.className = 'shaka-stream-stats';
    this.container.innerHTML = '--';
	//parent.appendChild(this.container);

    controls.getControlsContainer().appendChild(this.container);

// --- AUTO-HIDE WITH SHAKA CONTROLS ---
  const controlsContainer = controls.getControlsContainer();

  this.onControlsVisibilityChange = () => {
    const shown = controlsContainer.getAttribute('shown') === 'true';
    this.container.classList.toggle('visible', shown);
  };

  this.visibilityObserver = new MutationObserver(
    this.onControlsVisibilityChange
  );

  this.visibilityObserver.observe(controlsContainer, {
    attributes: true,
    attributeFilter: ['shown']
  });

  this.onControlsVisibilityChange();
  // ------------------------------------


    // Data tracking
    this.lastBytes = 0;
    //this.totalMB = 0;
	
	
this.totalMB = window.shakaSessionUsageMB || 0;

    // Bind update
    this.update = this.update.bind(this);

    // Listen to quality changes
    this.player.addEventListener('variantchanged', this.update);
    this.player.addEventListener('adaptation', this.update);

    // Periodic update (data usage grows over time)
    this.interval = setInterval(this.update, 1000);

    // Initial render
    this.update();
  }

  update() {
    const tracks = this.player.getVariantTracks();
    const active = tracks.find(t => t.active);
    const stats = this.player.getStats();

    // ---------- LINE 1: RESOLUTION (+ FPS) ----------
    let line1 = '';
    if (active?.height) {
      const fps = active.frameRate ? Math.round(active.frameRate) : '';
      line1 = fps ? `${active.height}p${fps}` : `${active.height}p`;
    }

    // ---------- LINE 2: BITRATE (kbps) ----------
    let line2 = '';
    const bw = active?.bandwidth || stats?.estimatedBandwidth;
    if (typeof bw === 'number' && bw > 0) {
      line2 = `${Math.round(bw / 1000)}kbps`;
    }

    // ---------- LINE 3: DATA USED (MB) ----------
    let bytes = 0;

    // Use the stat that actually updates in your setup
    if (typeof stats?.bytesDownloaded === 'number') {
      bytes = stats.bytesDownloaded;
    } else if (typeof stats?.totalBytesTransferred === 'number') {
      bytes = stats.totalBytesTransferred;
    }

    if (bytes > this.lastBytes) {
      this.totalMB += (bytes - this.lastBytes) / (1024 * 1024);
      this.lastBytes = bytes;
    }

    const line3 = `${this.totalMB.toFixed(1)} MB`;
	
	// ✅ Keep session total in sync to track Data usage
window.shakaSessionUsageMB = this.totalMB;



    // ---------- RENDER ----------
    const lines = [];

if (line1) lines.push(`<span class="stat-res">${line1}</span>`);
if (line2) lines.push(`<span class="stat-bw">${line2}</span>`);

// Data usage is always shown
lines.push(`<span class="stat-data">${line3}</span>`);

this.container.innerHTML = lines.join('<br>');

  }
  
release() {
  clearInterval(this.interval);
  this.visibilityObserver.disconnect();
  super.release();
}
}

class StreamStatsFactory {
  create(rootElement, controls) {
    return new StreamStatsElement(rootElement, controls);
  }
}
shaka.ui.Controls.registerElement(
  'stream_stats',
  new StreamStatsFactory()
);




initializePlayer();
