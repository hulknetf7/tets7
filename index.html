<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shaka Player with M3U8 Playlist</title>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <script>
        // Polyfills
        if (!Map.prototype.getOrInsertComputed) {
            Map.prototype.getOrInsertComputed = function (key, compute) {
                if (!this.has(key)) {
                    const value = compute();
                    this.set(key, value);
                    return value;
                }
                return this.get(key);
            };
        }
        if (!Map.prototype.getOrInsert) {
            Map.prototype.getOrInsert = function (key, value) {
                if (!this.has(key)) {
                    this.set(key, value);
                    return value;
                }
                return this.get(key);
            };
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/controls.min.css">
    
    <style type="text/css">
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100dvw;
        }

        #app {
            width: 100dvw;
            height: 100dvh;
            display: flex;
            flex-direction: row; /* Changed to row for side-by-side layout */
            background: #000;
            overflow: hidden;
        }

        /* Channel List Sidebar */
        #channel-list {
            width: 250px;
            height: 100%;
            background: #111;
            overflow-y: auto;
            border-right: 1px solid #222;
            z-index: 10;
        }

        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-item:hover {
            background: #252525;
        }

        .channel-item.active {
            background: #e50914;
            font-weight: bold;
        }

        /* Player Container */
        #shakaplayer {
            position: relative;
            background-color: black;
            flex-grow: 1; /* Takes remaining width */
            height: 100dvh;
            overflow: hidden;
        }

        .shaka-video-container {
            position: relative;
            background-color: black;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .shaka-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Stream Stats Style */
        .shaka-stream-stats {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 6px 8px;
            font-family: system-ui, sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .shaka-stream-stats.visible { opacity: 1; }
        .shaka-stream-stats .stat-data { color: rgba(255, 235, 180, 0.9); font-weight: 700; }
        .shaka-stream-stats .stat-res { color: rgba(180, 220, 255, 0.95); font-weight: 700; }
        .shaka-stream-stats .stat-bw { color: rgba(180, 255, 210, 0.95); font-weight: 700; }

        .shaka-bottom-controls { width: 96%; padding-bottom: 1%; z-index: 1; }
        
        /* Mobile refinement */
        @media (max-width: 768px) {
            #app { flex-direction: column-reverse; }
            #channel-list { width: 100%; height: 30dvh; border-right: none; border-top: 1px solid #222; }
            #shakaplayer { height: 70dvh; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="channel-list">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #333; color: #aaa;">Live Channels</div>
        <div id="channels-container">Loading playlist...</div>
    </div>

    <div id="shakaplayer">
        <div class="shaka-video-container">
            <video autoplay id="video" class="shaka-video"></video>
        </div>
    </div>
</div>

<script>
    let player; 
    let ui; 
    const playlistUrl = "https://allinonereborn.online/jiotv-m3u/playlist1221.m3u8";

    // Initialize Shaka Player
    async function initializePlayer() {
        const videoContainer = document.querySelector('.shaka-video-container');
        const videoElement = document.getElementById('video');
        
        videoElement.muted = true;
        videoElement.autoplay = true;

        player = new shaka.Player();

        const uiConfig = {
            fadeDelay: 0,
            closeMenusDelay: 3,
            forceLandscapeOnFullscreen: true,
            controlPanelElements: [
                'time_and_duration', 'mute', 'volume', 'skip_backward_5', 
                'skip_forward_5', 'stream_stats', 'play_pause', 'spacer', 
                'quality', 'overflow_menu', 'picture_in_picture', 'fullscreen'
            ],
            overflowMenuButtons: [
                'picture_in_picture', 'cast', 'loop', 'language', 
                'playback_rate', 'captions', 'save_video_frame', 'statistics', 'quality'
            ],
            seekBarColors: {
                base: 'rgba(255, 255, 255, 0.3)',
                buffered: 'rgba(63, 133, 244, 0.65)',
                played: 'rgb(229, 9, 31)'
            }
        };

        ui = new shaka.ui.Overlay(player, videoContainer, videoElement);
        window.shakaControls = ui.getControls();

        await player.attach(videoElement);
        ui.configure(uiConfig);

        player.configure({
            manifest: { dash: { ignoreMinBufferTime: true } }
        });

        // Load Playlist after player setup
        loadM3U8Playlist();
    }

    // Function to parse M3U8 and create channel list
    async function loadM3U8Playlist() {
        const container = document.getElementById('channels-container');
        try {
            const response = await fetch(playlistUrl);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.text();
            
            const lines = data.split('\n');
            container.innerHTML = ''; // Clear loading text
            
            let currentChannelName = '';
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Extract Channel Name
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannelName = nameMatch ? nameMatch[1] : 'Unknown Channel';
                } 
                // Extract URL (usually the line after #EXTINF)
                else if (line.startsWith('http')) {
                    const streamUrl = line;
                    createChannelButton(currentChannelName, streamUrl);
                }
            }
        } catch (error) {
            console.error("Error loading M3U8:", error);
            container.innerHTML = '<div style="padding:15px; color:red;">Failed to load playlist.</div>';
        }
    }

    function createChannelButton(name, url) {
        const container = document.getElementById('channels-container');
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerText = name;
        
        div.onclick = async () => {
            // Remove active class from all and add to clicked one
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            
            // Load channel in Shaka Player
            try {
                console.log(`Loading channel: ${name}`);
                await player.load(url);
            } catch (error) {
                console.error("Error loading stream:", error);
                alert("This channel cannot be played. It might be dead or require authentication.");
            }
        };
        
        container.appendChild(div);
    }

    // --- Custom Skip Buttons Registration ---
    class SkipForwardButton extends shaka.ui.Element {
        constructor(parent, controls) {
            super(parent, controls);
            this.button_ = document.createElement('button');
            this.button_.className = 'shaka-skip-forward-button';
            this.button_.innerHTML = `<svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M10,8V16L15,12L10,8M4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4C11.11,4 10.26,4.14 9.45,4.41L10.97,5.93C11.31,5.97 11.66,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,10.66 6.44,9.42 7.18,8.42L5.7,6.94C4.63,8.34 4,10.1 4,12M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12C2,9.22 3.14,6.7 5,4.91V2H7V7H2V5H3.61C2.6,6.96 2,9.41 2,12Z"/></svg>`;
            this.parent.appendChild(this.button_);
            this.eventManager.listen(this.button_, 'click', () => {
                if (this.video) this.video.currentTime = Math.min(this.video.currentTime + 5, this.video.duration);
            });
        }
    }
    class SkipBackwardButton extends shaka.ui.Element {
        constructor(parent, controls) {
            super(parent, controls);
            this.button_ = document.createElement('button');
            this.button_.className = 'shaka-skip-backward-button';
            this.button_.innerHTML = `<svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M12,4A6,6 0 0,1 18,12C18,13.34 17.56,14.58 16.82,15.58L18.3,17.06C19.37,15.66 20,13.9 20,12A10,10 0 0,0 10,2V4.91L11.89,3.03C11.26,2.37 10.41,2 9.5,2C8.59,2 7.74,2.37 7.11,3.03L9,4.91V2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12C22,9.22 20.86,6.7 19,4.91V2H17V7H22V5H20.39C21.4,6.96 22,9.41 22,12M14,16V8L9,12L14,16Z"/></svg>`;
            this.parent.appendChild(this.button_);
            this.eventManager.listen(this.button_, 'click', () => {
                if (this.video) this.video.currentTime = Math.max(this.video.currentTime - 5, 0);
            });
        }
    }
    
    shaka.ui.Controls.registerElement('skip_forward_5', { create: (root, ctrl) => new SkipForwardButton(root, ctrl) });
    shaka.ui.Controls.registerElement('skip_backward_5', { create: (root, ctrl) => new SkipBackwardButton(root, ctrl) });

    // --- Stream Stats Registration ---
    class StreamStatsElement extends shaka.ui.Element {
        constructor(parent, controls) {
            super(parent, controls);
            this.player = controls.getPlayer();
            this.container = document.createElement('div');
            this.container.className = 'shaka-stream-stats';
            controls.getControlsContainer().appendChild(this.container);

            const controlsContainer = controls.getControlsContainer();
            this.onControlsVisibilityChange = () => {
                const shown = controlsContainer.getAttribute('shown') === 'true';
                this.container.classList.toggle('visible', shown);
            };
            this.visibilityObserver = new MutationObserver(this.onControlsVisibilityChange);
            this.visibilityObserver.observe(controlsContainer, { attributes: true, attributeFilter: ['shown'] });
            
            this.interval = setInterval(() => this.update(), 1000);
            this.onControlsVisibilityChange();
        }
        update() {
            const tracks = this.player.getVariantTracks();
            const active = tracks.find(t => t.active);
            if (!active) return;
            
            let res = `${active.height}p`;
            let bw = `${Math.round(active.bandwidth / 1000)}kbps`;
            
            this.container.innerHTML = `<span class="stat-res">${res}</span><br><span class="stat-bw">${bw}</span>`;
        }
        release() {
            clearInterval(this.interval);
            this.visibilityObserver.disconnect();
            super.release();
        }
    }
    shaka.ui.Controls.registerElement('stream_stats', { create: (root, ctrl) => new StreamStatsElement(root, ctrl) });

    initializePlayer();
</script>
    
</body>
</html>
