<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player - Fix</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #video-container { width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; }
        #pro-launcher {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: #007bff; color: white; border: none;
            padding: 10px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="video-container" shaka-controls-container>
    <button id="pro-launcher">PRO Tools</button>
    <video id="video" autoplay crossorigin="anonymous"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.ui.js"></script>

<script>
// AGAR YE LINK PURANA HAI TO BLACK SCREEN HI DIKHEGI
// NAYA LINK DALNA JARURI HAI
const manifestUri = 'https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_BTS/output/index.mpd?__hdnea__=st=1774937870~exp=1775024270~acl=/*~hmac=a5156ff146747037632d3461c277c16755bf24d805f32ca2c97d4e744563e15a';

async function init() {
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, videoContainer, video);

    ui.configure({
        'controlPanelElements': ['play_pause', 'rewind', 'fast_forward', 'time_and_duration', 'spacer', 'quality', 'fullscreen'],
        'addFastForwardButton': true,
        'addRewindButton': true
    });

    player.configure({
        drm: {
            clearKeys: {
                '965dc2ddb1d85138ad787999a7f30ca5': '859695076e67fe961836b564db6d689c'
            }
        },
        manifest: {
            dash: {
                ignoreMinBufferTime: true
            }
        },
        network: {
            requestFilter: (type, request) => {
                // User Agent set kar rahe hain
                request.headers['User-Agent'] = '@allinone_reborn';
                
                // Agar stream block ho rahi hai toh CORS Proxy use karein
                // request.uris[0] = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(request.uris[0]);
            }
        }
    });

    try {
        await player.load(manifestUri);
    } catch (e) {
        console.error('Playback Error:', e);
        alert('Stream Error: Link expire ho chuka hai ya CORS issue hai.');
    }
}

// Video Pro Tools Script (Integrated)
document.getElementById('pro-launcher').onclick = function() {
    if(document.getElementById('v-pro-smooth')){document.getElementById('v-pro-smooth').remove();return;}
    var p=document.createElement('div');
    p.id='v-pro-smooth';
    p.style="position:fixed;top:70px;left:20px;z-index:1000000;background:rgba(15,15,15,0.95);color:#fff;padding:15px;border-radius:12px;border:2px solid #007bff;width:230px;box-shadow:0 10px 30px #000;";
    p.innerHTML = '<div style="text-align:center;font-weight:bold;color:#007bff;margin-bottom:15px">Video Pro + Smooth</div>' +
        sldr('Contrast','cIn',0.5,3,1,0.1) + sldr('Saturate','sIn',0.5,3,1,0.1) +
        sldr('Brightness','bIn',0.5,2,1,0.1) + sldr('Smoothness','smIn',0,2,0,0.1) +
        '<div style="display:flex;gap:5px;margin-top:10px"><button id="rBtn" style="flex:1;background:#444;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer">Reset</button><button id="xBtn" style="flex:1;background:#d32f2f;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer">Close</button></div>';
    document.body.appendChild(p);

    function sldr(l,i,min,max,v,s){return '<div style="margin-bottom:10px;font-size:12px"><div style="display:flex;justify-content:space-between"><span>'+l+'</span><span id="'+i+'V">'+v+'</span></div><input type="range" id="'+i+'" min="'+min+'" max="'+max+'" step="'+s+'" value="'+v+'" style="width:100%"></div>';}
    
    function up(){
        var c=document.getElementById('cIn').value, s=document.getElementById('sIn').value, b=document.getElementById('bIn').value, sm=document.getElementById('smIn').value;
        document.getElementById('cInV').innerText=c; document.getElementById('sInV').innerText=s; document.getElementById('bInV').innerText=b; document.getElementById('smInV').innerText=sm;
        video.style.filter = `contrast(${c}) saturate(${s}) brightness(${b}) blur(${sm}px)`;
    }
    ['cIn','sIn','bIn','smIn'].forEach(id => document.getElementById(id).oninput = up);
    document.getElementById('rBtn').onclick = () => { ['cIn','sIn','bIn'].forEach(i=>document.getElementById(i).value=1); document.getElementById('smIn').value=0; up(); };
    document.getElementById('xBtn').onclick = () => p.remove();
};

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
