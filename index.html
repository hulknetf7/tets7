<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced M3U8 Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .player-container { max-width: 900px; margin: 30px auto; background: #1a1a1a; padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 8px; background: black; }
        
        .controls-row { margin-top: 15px; display: flex; justify-content: center; gap: 15px; align-items: center; flex-wrap: wrap; }
        button { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #b20710; }
        
        select { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; }
        label { font-size: 14px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="player-container">
    <h2 style="color: #e50914;">Premium Stream Player</h2>
    
    <video id="video" controls crossorigin="true"></video>

    <div class="controls-row">
        <button onclick="changeTime(-10)">-10s Backward</button>
        <button onclick="changeTime(10)">+10s Forward</button>

        <div>
            <label for="qualitySelect">Quality:</label>
            <select id="qualitySelect">
                <option value="-1">Auto (Loading...)</option>
            </select>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    const video = document.getElementById('video');
    const qualitySelect = document.getElementById('qualitySelect');
    
    // Aapka M3U8 Link
    const videoSrc = 'PASTE_YOUR_LINK_HERE';

    if (Hls.isSupported()) {
        const hls = new Hls({
            xhrSetup: function (xhr) {
                xhr.withCredentials = true; // For Cookies
            },
            // Manual quality setting ke liye auto level switching off
            autoStartLoad: true,
            startLevel: -1 
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        // Jab manifest load ho jaye, tab quality options bharein
        hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
            const levels = hls.levels;
            qualitySelect.innerHTML = ''; // Clear loading
            
            // Auto Option
            let autoOption = document.createElement('option');
            autoOption.text = "Auto";
            autoOption.value = -1;
            qualitySelect.appendChild(autoOption);

            // Available Qualities add karein
            levels.forEach((level, index) => {
                let option = document.createElement('option');
                option.text = level.height + "p";
                option.value = index;
                qualitySelect.appendChild(option);
            });
        });

        // Resolution Change Handler
        qualitySelect.onchange = function() {
            const selectedLevel = parseInt(this.value);
            console.log("Setting quality to: " + selectedLevel);
            
            // Isse quality fix ho jayegi, net fast ho ya slow change nahi hogi
            hls.currentLevel = selectedLevel; 
            
            if(selectedLevel !== -1) {
                hls.loadLevel = selectedLevel; // Forced Lock
            }
        };

        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                console.error("Fatal error:", data.type);
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // For Safari/iOS
        video.src = videoSrc;
    }

    // Forward/Backward function
    function changeTime(seconds) {
        video.currentTime += seconds;
    }
</script>

</body>
</html>
