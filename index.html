<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic M3U8 Master Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0e11; color: #e9eaeb; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        
        /* Input Section Styling */
        .input-panel { background: #1e2329; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #f0b90b; }
        input, textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #474d57; background: #2b3139; color: white; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        
        /* Buttons */
        .btn-play { background: #f0b90b; color: black; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-play:hover { background: #d9a508; }

        /* Player Styling */
        .video-section { position: relative; background: black; border-radius: 12px; overflow: hidden; display: none; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .custom-controls { background: #1e2329; padding: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; border-radius: 0 0 12px 12px; }
        .control-btn { background: #474d57; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        select { background: #474d57; color: white; padding: 8px; border-radius: 4px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="input-panel">
        <h2 style="margin-top:0; color:#f0b90b;">Stream Configurator</h2>
        
        <div class="input-group">
            <label>M3U8 Stream URL:</label>
            <input type="text" id="m3u8Input" placeholder="https://example.com/master.m3u8...">
        </div>

        <div class="input-group">
            <label>Cookie String:</label>
            <textarea id="cookieInput" placeholder="CloudFront-Key-Pair-Id=...; hdntl=..."></textarea>
        </div>

        <button class="btn-play" onclick="loadPlayer()">PLAY STREAM</button>
    </div>

    <div id="playerContainer" class="video-section">
        <video id="video" controls></video>
        
        <div class="custom-controls">
            <button class="control-btn" onclick="seek(-10)">-10s</button>
            <button class="control-btn" onclick="seek(10)">+10s</button>
            
            <label style="margin-left:20px; color:white;">Quality:</label>
            <select id="resSelector">
                <option value="-1">Auto</option>
            </select>
        </div>
    </div>
</div>

<script>
    let hls = new Hls();

    function loadPlayer() {
        const m3u8Url = document.getElementById('m3u8Input').value;
        const cookieData = document.getElementById('cookieInput').value;
        const video = document.getElementById('video');
        const resSelector = document.getElementById('resSelector');
        const playerDiv = document.getElementById('playerContainer');

        if (!m3u8Url) {
            alert("Bhai, kam se kam M3U8 link toh daalo!");
            return;
        }

        // Show Player
        playerDiv.style.display = 'block';

        if (Hls.isSupported()) {
            // Destroy previous instance if any
            hls.destroy();
            hls = new Hls({
                xhrSetup: function(xhr) {
                    xhr.withCredentials = true; // Taaki cookies bhej sake
                }
            });

            hls.loadSource(m3u8Url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // Resolution Selector Fill Karna
                resSelector.innerHTML = '<option value="-1">Auto</option>';
                hls.levels.forEach((level, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.innerHTML = level.height + "p";
                    resSelector.appendChild(opt);
                });
                video.play();
            });

            // Manual Resolution Lock (Network slow ho phir bhi change nahi hoga)
            resSelector.onchange = function() {
                const levelIndex = parseInt(this.value);
                hls.currentLevel = levelIndex;
                hls.loadLevel = levelIndex; // Force lock
                console.log("Quality Locked to: " + levelIndex);
            };

        } else {
            alert("Aapka browser HLS support nahi karta.");
        }
    }

    function seek(seconds) {
        document.getElementById('video').currentTime += seconds;
    }
</script>

</body>
</html>
