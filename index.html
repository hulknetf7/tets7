<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Live TV UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.js"></script><style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  display:flex;
}

/* Sidebar */
#sidebar {
  width:260px;
  background:#111;
  height:100vh;
  overflow-y:auto;
  border-right:1px solid #222;
}

.channel {
  padding:15px;
  cursor:pointer;
  border-bottom:1px solid #222;
  transition:0.3s;
}

.channel:hover {
  background:#1f1f1f;
}

.active {
  background:#ff3d00;
}

/* Main Player */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

#player-container {
  flex:1;
}

video {
  width:100%;
  height:100vh;
}

/* Header */
#header {
  padding:12px;
  background:#111;
  font-size:18px;
  border-bottom:1px solid #222;
}
</style></head><body><div id="sidebar">
  <div class="channel active" onclick="playChannel('1', this)">
    Star Sports 1 HD
  </div>
  <div class="channel" onclick="playChannel('2', this)">
    Star Sports 1 Hindi HD
  </div>
</div><div id="main">
  <div id="header">📺 Live TV</div>
  <div id="player-container">
    <video id="video" autoplay controls></video>
  </div>
</div><script>
let player;

const channels = {
  "1": {
    name: "Star Sports 1 HD",
    url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd?cookie=__hdnea__=st=1775021504~exp=1775107904~acl=/*~hmac=045c4a0c3ea4d125ef8412eae95f5a5a23ad0fc701c8b9df5c0a2a4830454d87",
    keyId: "965dc2ddb1d85138ad787999a7f30ca5",
    key: "859695076e67fe961836b564db6d689c"
  },
  "2": {
    name: "Star Sports 1 Hindi HD",
    url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd?cookie=__hdnea__=st=1775021504~exp=1775107904~acl=/*~hmac=045c4a0c3ea4d125ef8412eae95f5a5a23ad0fc701c8b9df5c0a2a4830454d87",
    keyId: "400131994b445d8c8817202248760fda",
    key: "2d56cb6f07a75b9aff165d534ae2bfc4"
  }
};

async function init() {
  const video = document.getElementById('video');

  player = new shaka.Player(video);

  new shaka.ui.Overlay(player, video, video.parentElement);

  playChannel("1", document.querySelector('.channel'));
}

async function playChannel(id, el) {
  document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
  if(el) el.classList.add('active');

  const ch = channels[id];

  try {
    await player.unload();

    player.configure({
      drm: {
        clearKeys: {
          [ch.keyId]: ch.key
        }
      }
    });

    await player.load(ch.url);

    document.getElementById('header').innerText = "📺 " + ch.name;

  } catch(e) {
    console.error("Error:", e);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script></body>
</html>
