        async function initApp() {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) {
                alert('Browser not supported!');
                return;
            }

            const video = document.getElementById('video');
            const ui = video['ui'];
            const player = new shaka.Player(video);
            const selector = document.getElementById('quality-selector');

            // Header/Cookie Filter
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.allowCrossSiteCredentials = true;
                request.headers['Cookie'] = cookieString;
            });

            // Config for ABR and M3U8
            player.configure({
                streaming: { bufferingGoal: 30 },
                manifest: { hls: { xhrWithCredentials: true } }
            });

            try {
                await player.load(manifestUri);
                console.log('Video Loaded!');

                // Resolution List
                const tracks = player.getVariantTracks().sort((a,b) => b.height - a.height);
                tracks.forEach(track => {
                    if (track.height) {
                        const opt = document.createElement('option');
                        opt.value = track.id;
                        opt.text = track.height + "p";
                        selector.appendChild(opt);
                    }
                });

                // Manual Resolution Change
                selector.addEventListener('change', () => {
                    if (selector.value === 'auto') {
                        player.configure({ abr: { enabled: true } });
                    } else {
                        player.configure({ abr: { enabled: false } });
                        const selectedTrack = tracks.find(t => t.id == selector.value);
                        player.selectVariantTrack(selectedTrack, true);
                    }
                });

            } catch (e) {
                console.error('Load Error:', e);
            }
        }

        function seek(sec) {
            document.getElementById('video').currentTime += sec;
        }

        document.addEventListener('shaka-ui-loaded', initApp);
        document.addEventListener('shaka-ui-load-failed', () => alert('UI Load Failed'));
