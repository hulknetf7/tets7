<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Stable DRM Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.js"></script><style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
</style></head><body><video id="video" autoplay muted playsinline controls></video>

<script>
async function init() {
  const video = document.getElementById('video');

  const player = new shaka.Player(video);

  // Error logs
  player.addEventListener('error', e => {
    console.error('Shaka Error:', e.detail);
    alert("Error aaya - console check karo (F12)");
  });

  // IMPORTANT: DRM ClearKey
  player.configure({
    drm: {
      clearKeys: {
        "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4"
      }
    }
  });

  // STREAM URL (cleaned)
  const url = "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd?cookie=__hdnea__=st=1775021504~exp=1775107904~acl=/*~hmac=045c4a0c3ea4d125ef8412eae95f5a5a23ad0fc701c8b9df5c0a2a4830454d87";

  try {
    await player.load(url);
    console.log("✅ Video Playing");
  } catch (err) {
    console.error("Load failed:", err);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script></body>
</html>
