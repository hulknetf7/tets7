<!DOCTYPE html>
<html>
<head>
    <title>Sports Live Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; }
        #sidebar { width: 300px; height: 100vh; overflow-y: auto; background: #111; }
        #video-container { flex: 1; height: 100vh; }
        .channel { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .channel:hover { background: #333; }
        .channel img { width: 50px; margin-right: 10px; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="sidebar" id="list">
    </div>

<div id="video-container" data-shaka-player-container>
    <video autoplay id="video" data-shaka-player-video></video>
</div>

<script>
const channels = [
    { name: "Star Sports 1 HD", url: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_BTS/output/index.mpd?__hdnea__=st=1774925368~exp=1775011768~acl=/*~hmac=9deb8c1930715c6a49b27570eff8279fa785e4350b8f515b6e62f7645066b3b7", kid: "965dc2ddb1d85138ad787999a7f30ca5", key: "859695076e67fe961836b564db6d689c" },
    { name: "Star Sports 1 Hindi HD", url: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd?__hdnea__=st=1774925368~exp=1775011768~acl=/*~hmac=9deb8c1930715c6a49b27570eff8279fa785e4350b8f515b6e62f7645066b3b7", kid: "400131994b445d8c8817202248760fda", key: "2d56cb6f07a75b9aff165d534ae2bfc4" },
    { name: "Star Sports Select 2 HD", url: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_Select_HD_2_BTS/output/index.mpd?__hdnea__=st=1774925368~exp=1775011768~acl=/*~hmac=9deb8c1930715c6a49b27570eff8279fa785e4350b8f515b6e62f7645066b3b7", kid: "6017d0514d425fa38f6e80ba6dcc852f", key: "0018944b00adf2078f62386f30c68b74" }
];

async function initPlayer() {
    const video = document.getElementById('video');
    const player = new shaka.Player(video);
    const sidebar = document.getElementById('sidebar');

    channels.forEach(ch => {
        let div = document.createElement('div');
        div.className = 'channel';
        div.innerText = ch.name;
        div.onclick = async () => {
            try {
                await player.configure({
                    drm: { clearKeys: { [ch.kid]: ch.key } }
                });
                // Fake User-Agent for Jio
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36';
                });
                await player.load(ch.url);
            } catch(e) { alert("Error: Link expired or CORS issue!"); }
        };
        sidebar.appendChild(div);
    });
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
