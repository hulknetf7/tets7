        /* Video Player Area */
        #player-wrapper { flex-grow: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        #shakaplayer { width: 100%; height: 100%; max-height: 100vh; }
        
        /* Sidebar Styles */
        #sidebar { width: 320px; background: #111; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 1.2rem; font-weight: bold; background: #1a1a1a; border-bottom: 2px solid #ed1c24; text-transform: uppercase; letter-spacing: 1px; }
        #channel-list { overflow-y: auto; flex-grow: 1; }
        
        /* Channel Item */
        .channel-item { padding: 12px 15px; border-bottom: 1px solid #1f1f1f; cursor: pointer; display: flex; align-items: center; transition: all 0.2s ease; }
        .channel-item:hover { background: #252525; }
        .channel-item.active { background: #333; border-left: 4px solid #ed1c24; }
        .channel-item img { width: 60px; height: 40px; object-fit: contain; margin-right: 15px; background: #000; border-radius: 4px; }
        .channel-item span { font-size: 14px; font-weight: 500; color: #eee; }

        @media (max-width: 768px) {
            #container { flex-direction: column; }
            #sidebar { width: 100%; height: 250px; border-left: none; }
        }
    </style>

let player, ui;

// Function to Parse M3U
function parseM3U(data) {
    const lines = data.split('\n');
    const channels = [];
    let currentChannel = {};

    lines.forEach(line => {
        if (line.startsWith('#EXTINF')) {
            currentChannel.name = line.split(',')[1].trim();
            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            currentChannel.logo = logoMatch ? logoMatch[1] : "";
        } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
            const keys = line.split('=')[1].split(':');
            currentChannel.keyId = keys[0].trim();
            currentChannel.key = keys[1].trim();
        } else if (line.startsWith('http')) {
            currentChannel.url = line.trim();
            channels.push({...currentChannel});
            currentChannel = {};
        }
    });
    return channels;
}

const channels = parseM3U(rawM3U);

async function init() {
    const video = document.getElementById('video');
    const container = document.getElementById('shakaplayer');
    
    player = new shaka.Player(video);
    ui = new shaka.ui.Overlay(player, container, video);

    // Build Channel List
    const listDiv = document.getElementById('channel-list');
    channels.forEach((ch, index) => {
        const item = document.createElement('div');
        item.className = 'channel-item';
        item.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        item.onclick = () => {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            loadChannel(ch);
        };
        listDiv.appendChild(item);
    });

    // Load first channel on start
    if(channels.length > 0) {
        listDiv.firstChild.classList.add('active');
        loadChannel(channels[0]);
    }
}

async function loadChannel(ch) {
    try {
        player.configure({
            drm: {
                clearKeys: { [ch.keyId]: ch.key }
            }
        });

        // Add JioTV specific User-Agent
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = '@allinone_reborn';
        });

        await player.load(ch.url);
    } catch (e) {
        console.error("Load Error", e);
    }
}

document.addEventListener('shaka-ui-loaded', init);
