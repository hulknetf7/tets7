<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Shaka Player: Manual M3U8 & Cookies</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    <style>
        body { background: #0e1217; color: #fff; font-family: sans-serif; padding: 20px; }
        .input-box { background: #1c2128; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #30363d; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; color: #58a6ff; border: 1px solid #30363d; border-radius: 5px; box-sizing: border-box; }
        button { background: #238636; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .video-container { width: 100%; max-width: 900px; margin: auto; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .controls-extra { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        select { padding: 10px; background: #30363d; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="video-container">
    <div class="input-box">
        <label>1. M3U8 Link:</label>
        <input type="text" id="manifestUri" placeholder="Paste your .m3u8 link here...">
        
        <label>2. Cookie String:</label>
        <textarea id="cookieInput" rows="3" placeholder="CloudFront-Key-Pair-Id=...; hdntl=..."></textarea>
        
        <button onclick="initPlayer()">LOAD & PLAY</button>
    </div>

    <div id="videoParent" style="display:none;">
        <div data-shaka-player-container style="width:100%">
            <video id="video" autoplay></video>
        </div>
        
        <div class="controls-extra">
            <button onclick="step(-10)" style="width:80px;">-10s</button>
            <button onclick="step(10)" style="width:80px;">+10s</button>
            <select id="resSelect">
                <option value="auto">Auto Quality</option>
            </select>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.compiled.debug.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.js"></script>

<script>
    let player;
    let video;

    async function initPlayer() {
        const manifestUri = document.getElementById('manifestUri').value;
        const cookieStr = document.getElementById('cookieInput').value;
        video = document.getElementById('video');
        const resSelect = document.getElementById('resSelect');

        if (!manifestUri) return alert("Link missing!");

        document.getElementById('videoParent').style.display = 'block';

        // 1. Install polyfills
        shaka.polyfill.installAll();

        // 2. Check browser support
        if (!shaka.Player.isBrowserSupported()) {
            alert('Browser not supported!');
            return;
        }

        // 3. Create Player instance
        player = new shaka.Player(video);

        // 4. Configure Cookies (withCredentials)
        player.configure({
            streaming: {
                bufferingGoal: 30,
            },
            manifest: {
                dash: {
                    xhrWithCredentials: true
                },
                hls: {
                    xhrWithCredentials: true
                }
            }
        });

        // Add cookies to headers for every request
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.allowCrossSiteCredentials = true;
            // Shaka automatically sends cookies if xhrWithCredentials is true 
            // and the domain matches.
        });

        try {
            await player.load(manifestUri);
            console.log('Video loaded successfully!');
            
            // Populate Resolutions
            updateResolutionOptions();
        } catch (e) {
            console.error('Error loading video', e);
            alert("Error: Link ya Cookie invalid hai. Check Console.");
        }
    }

    function updateResolutionOptions() {
        const resSelect = document.getElementById('resSelect');
        const tracks = player.getVariantTracks();
        
        // Remove old options
        resSelect.innerHTML = '<option value="auto">Auto Quality</option>';

        // Add available resolutions
        tracks.forEach(track => {
            if (track.height) {
                let opt = document.createElement('option');
                opt.value = track.id;
                opt.text = track.height + 'p (' + Math.round(track.bandwidth / 1000) + ' kbps)';
                resSelect.appendChild(opt);
            }
        });

        resSelect.onchange = () => {
            if (resSelect.value === 'auto') {
                // Auto mode on
                player.configure({ abr: { enabled: true } });
            } else {
                // Manual Lock (ABR Off)
                player.configure({ abr: { enabled: false } });
                const selectedTrack = tracks.find(t => t.id == resSelect.value);
                player.selectVariantTrack(selectedTrack, true); // true = force clear buffer
            }
        };
    }

    function step(seconds) {
        video.currentTime += seconds;
    }
</script>

</body>
</html>
